global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "dfir-api"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "dfir-api:8000"
        labels:
          service: "dfir-api"
          platform: "dfir-platform"
          case: "idor"