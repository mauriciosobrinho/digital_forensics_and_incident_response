global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: dfir-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - dfir-api:8000
        labels:
          platform: dfir-platform
          service: dfir-api
          case: idor

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
        labels:
          platform: dfir-platform
          service: prometheus

  - job_name: alertmanager
    static_configs:
      - targets:
          - alertmanager:9093
        labels:
          platform: dfir-platform
          service: alertmanager