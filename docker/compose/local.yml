name: dfir-platform

services:
  dfir-streamlit:
    build:
      context: ../..
      dockerfile: docker/streamlit.Dockerfile
    container_name: dfir-streamlit
    env_file:
      - ../environments/docker.env
    ports:
      - "8501:8501"
    volumes:
      - ../../data:/app/data
      - ../../reports:/app/reports
    restart: unless-stopped

  dfir-api:
    build:
      context: ../..
      dockerfile: docker/fastapi.Dockerfile
    container_name: dfir-api
    env_file:
      - ../environments/docker.env
    ports:
      - "8000:8000"
    volumes:
      - ../../data:/app/data
      - ../../reports:/app/reports
    restart: unless-stopped