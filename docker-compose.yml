name: dfir-platform

services:
  dfir-streamlit:
    environment:
      DFIR_ENABLE_PLATFORM_NAV: "true"
    build:
      context: .
      dockerfile: docker/streamlit.Dockerfile
    container_name: dfir-streamlit
    env_file:
      - docker/environments/docker.env
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped

  dfir-api:
    build:
      context: .
      dockerfile: docker/fastapi.Dockerfile
    container_name: dfir-api
    env_file:
      - docker/environments/docker.env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    restart: unless-stopped